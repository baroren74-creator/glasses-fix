<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>Repair Assistant with Camera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }
    #videoContainer {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    #overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px 10px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
      text-align: center;
    }
    #stepText {
      font-size: 18px;
      margin-bottom: 10px;
    }
    #nextBtn {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: #fff;
      cursor: pointer;
    }
    #nextBtn:disabled {
      background: #777;
      cursor: default;
    }
  </style>
</head>
<body>

<div id="videoContainer">
  <video id="video" autoplay playsinline></video>
  <div id="overlay">
    <div id="stepText"></div>
    <button id="nextBtn">הבא</button>
  </div>
</div>

<script>
  // Array of steps from the Xbox controller drift repair guide
  const steps = [
    "פתח את 7 הברגים מאחור",
    "הסר את הכיסוי האחורי בזהירות (שים לב לחוטים שלא יינתקו)",
    "נקה בעדינות את בסיס הג׳ויסטיק באמצעות מקלון עם אלכוהול — לא להציף בנוזל",
    "ייבש את הסטיקים עם מייבש שיער",
    "הרכב את השלט מחדש – החזר את הכיסוי וחזק את כל הברגים בסדר הפוך לסדר הפירוק"
  ];

  let current = 0;

  function renderStep() {
    const stepEl = document.getElementById('stepText');
    stepEl.innerText = `${current + 1}/${steps.length}  ${steps[current]}`;
    // Disable button at last step
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.disabled = (current >= steps.length - 1);
  }

  document.getElementById('nextBtn').addEventListener('click', () => {
    if (current < steps.length - 1) {
      current++;
      renderStep();
    }
  });

  async function startCamera() {
    try {
      // Request the rear camera (if available)
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false });
      const video = document.getElementById('video');
      video.srcObject = stream;
    } catch (error) {
      // Show alert if camera cannot be accessed
      alert('לא ניתן לגשת למצלמה. ודא שהרשאות המצלמה הופעלו בדפדפן ובמכשיר.');
      console.error('Camera error:', error);
    }
  }

  // Start camera when page loads
  startCamera();
  // Render the first step
  renderStep();
</script>

</body>
</html>
