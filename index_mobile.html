<!DOCTYPE html>
<html>
<head>
  <title>Repair Assistant with Voice Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
      background: #111;
      color: white;
    }
    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 15px;
      margin-top: 50px;
    }
    button {
      margin-top: 20px;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>

  <h1>🔧 Repair Assistant</h1>

  <div class="card">
    <h2 id="step"></h2>
    <button id="next-btn">הבא</button>
    <p style="margin-top: 15px; font-size: 14px; color: #aaa;">אפשר להגיד "הבא" כדי לעבור לשלב הבא</p>
  </div>

  <script>
    const steps = [
      "פתח את 7 הברגים מאחור",
      "הסר את הכיסוי האחורי בזהירות (שים לב לחוטים שלא יינתקו)",
      "נקה בעדינות את בסיס הג׳ויסטיק באמצעות מקלון עם אלכוהול — לא להציף בנוזל",
      "ייבש את הסטיקים עם מייבש שיער"
    ];

    let current = 0;

    function render() {
      document.getElementById("step").innerText = steps[current];
      speak(steps[current]);
    }

    function nextStep() {
      if (current < steps.length - 1) {
        current++;
        render();
      }
    }

    function speak(text) {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = "he-IL";
      speechSynthesis.speak(msg);
    }

    document.getElementById("next-btn").addEventListener("click", nextStep);

    // Voice recognition setup (works in Chrome-based browsers)
    try {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.lang = "he-IL";
      recognition.onresult = function(event) {
        const text = event.results[event.results.length - 1][0].transcript.trim();
        if (text.includes("הבא") || text.toLowerCase().includes("next")) {
          nextStep();
        }
      };
      recognition.start();
    } catch (e) {
      console.warn('Voice recognition not supported:', e);
    }

    // Start with the first step
    render();
  </script>

</body>
</html>
