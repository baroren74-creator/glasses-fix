<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מרכז מדריכים – בחירת מוצר</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      padding: 20px;
    }
    h1 { text-align: center; }
    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .card {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: transform 0.2s, background-color 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      background-color: #2a2a2a;
    }
    .card h2 { margin: 0 0 10px 0; }
    .card p { margin: 0; color: #ccc; }
    /* מדריך */
    #guide-view { display: none; max-width: 600px; margin: 0 auto; }
    #step-counter { margin-bottom: 15px; font-weight: bold; }
    #step-image { width: 100%; border-radius: 8px; background: #333; margin-bottom: 15px; }
    #step-text { white-space: pre-line; margin-bottom: 20px; }
    #nav-buttons { display: flex; justify-content: space-between; }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { background-color: #777; cursor: default; }
  </style>
</head>
<body>
  <h1>מרכז מדריכים</h1>
  <div id="menu-view" class="menu">
    <div class="card" onclick="selectGuide('xbox')">
      <h2>תיקון Drift בג׳ויסטיק – Xbox 360</h2>
      <p>החלפת ג'ויסטיק תקול בבקר ה-Xbox 360 בשל Drift.</p>
    </div>
    <div class="card" onclick="selectGuide('trackpad')">
      <h2>Magic Trackpad Teardown</h2>
      <p>פירוק מלא (ארבעת השלבים הראשונים) של משטח המגע הקסום של Apple.</p>
    </div>
  </div>

  <div id="guide-view">
    <button onclick="backToMenu()">⬅ חזרה לתפריט</button>
    <div id="step-counter"></div>
    <img id="step-image" src="" alt="תמונת שלב">
    <div id="step-text"></div>
    <div id="nav-buttons">
      <button id="prev-btn" onclick="prevStep()">הקודם</button>
      <button id="next-btn" onclick="nextStep()">הבא</button>
    </div>
  </div>

  <script>
    // נתוני מדריכים
    const guides = {
      xbox: [
        { text: "פתח את 7 הברגים מאחור בעזרת מברג Torx T8.", image: "https://guide-images.cdn.ifixit.com/igi/PA5GCyolHvMEen1j.standard" },
        { text: "הסר בעדינות את הכיסוי האחורי. שים לב לחוטים מחוברים שלא יתנתקו.", image: "https://guide-images.cdn.ifixit.com/igi/bpuIiB59HcQQrpMs.standard" },
        { text: "נקה את בסיס הג׳ויסטיק באמצעות מקלון אוזניים עם מעט אלכוהול איזופרופיל או רפואי. הימנע מהצפת נוזל.", image: "https://guide-images.cdn.ifixit.com/igi/GYFT3n86PfTkzN6u.standard" },
        { text: "ייבש את הסטיקים עם מייבש שיער כדי למנוע נזק מנוזלים.", image: "https://guide-images.cdn.ifixit.com/igi/M3uYYwRvzzjJVlBP.standard" },
        { text: "הרכב את השלט מחדש – החזר את הכיסוי וחזק את כל הברגים בסדר הפוך לפירוק.", image: "https://guide-images.cdn.ifixit.com/igi/L4SBRcKfqwKEoA9R.standard" }
      ],
      trackpad: [
        { text: `ה-Magic Trackpad הוא משטח המגע השולחני הראשון המציע סט מלא של מחוות: לחיצה, גלילה, החלקה וסיבוב – הכל בקצות האצבעות.\n\nדרישות:\n• מחשב מק מסוג שולחני או נייד\n• חיבור Bluetooth\n• macOS 10.6.4 או חדש יותר\n• וכמובן, סוללות! (מטען סוללות של אפל אינו כלול)\n\nעל פי השמועות, ה-Magic Trackpad הוא דגם A1339.`, image: "https://guide-images.cdn.ifixit.com/igi/OKmGSYS4qHZ1h1NL.standard" },
        { text: `ה-Magic Trackpad גדול ב-80% מהמשטח שבמחשבי MacBook Pro נוכחיים.\nהוא מעוצב מאלומיניום ממש כמו המקלדת האלחוטית, כדי לאפשר שילוב מושלם של הקלדה ומחוות.\nמשטח הזכוכית בעל עובי של 0.5 מ"מ ומצופה להגנה מפני בלאי.\nמה יש בפנים? בואו נגלה!`, image: "https://guide-images.cdn.ifixit.com/igi/YImFsxtyZH5jNLCo.standard" },
        { text: `שלב זה עוסק בהוצאת הסוללות. סובבו את פתח הסוללות ופשוט הוציאו את שתי סוללות AA.\nשימו לב לחוט הברגה המרובע – סוג הברגה יעיל במיוחד מבחינה מכנית, אך קשה לייצור ולכן נדיר. שאפו, אפל, על תשומת הלב לפרטים!`, image: "https://guide-images.cdn.ifixit.com/igi/haRDIhncK3oj51ac.standard" },
        { text: `הגיע הזמן להתחיל בפירוק! השתמשו בכלי פלסטי לפתיחת מכשירים כדי להפריד את הפאנל התחתון מהדבק סביב צידו השמאלי, הימני והעליון.\n⚠️ אל תפרקו לאורך הקצה התחתון – קיימים שם תפסים שמחזיקים את המכסה.\nלאחר חיתוך רוב הדבק, הפאנל התחתון יוסר בקלות.`, image: "https://guide-images.cdn.ifixit.com/igi/KA2CBSt1Pf1CfAfO.standard" }
      ]
    };

    let currentGuide = null;
    let currentStepIndex = 0;

    const menuView = document.getElementById('menu-view');
    const guideView = document.getElementById('guide-view');
    const stepCounterEl = document.getElementById('step-counter');
    const stepImageEl = document.getElementById('step-image');
    const stepTextEl = document.getElementById('step-text');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function selectGuide(name) {
      currentGuide = name;
      currentStepIndex = 0;
      menuView.style.display = 'none';
      guideView.style.display = 'block';
      renderStep();
    }

    function backToMenu() {
      guideView.style.display = 'none';
      menuView.style.display = 'flex';
      currentGuide = null;
    }

    function renderStep() {
      const steps = guides[currentGuide];
      const step = steps[currentStepIndex];
      stepCounterEl.textContent = `${currentStepIndex + 1} / ${steps.length}`;
      stepImageEl.src = step.image;
      stepTextEl.textContent = step.text;
      prevBtn.disabled = currentStepIndex === 0;
      nextBtn.disabled = currentStepIndex === steps.length - 1;
      speak(step.text);
    }

    function prevStep() {
      if (currentStepIndex > 0) {
        currentStepIndex--;
        renderStep();
      }
    }

    function nextStep() {
      const steps = guides[currentGuide];
      if (currentStepIndex < steps.length - 1) {
        currentStepIndex++;
        renderStep();
      }
    }

    // פונקציה להקראת הטקסט
    function speak(text) {
      if (!('speechSynthesis' in window)) return; // אין תמיכה
      // ביטול הקראה קודמת אם עדיין רצה
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'he-IL';
      // ב-iOS יש צורך באינטראקציה - ההקראה תיעשה לאחר לחיצה על כפתור או בחירה במדריך
      window.speechSynthesis.speak(utterance);
    }
  </script>
</body>
</html>
