<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Trackpad Teardown – מדריך אינטראקטיבי</title>
  <style>
    /* סגנון בסיסי לעמוד */
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    #guide {
      max-width: 600px;
      width: 100%;
      background-color: #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      padding: 20px;
    }
    #step-image {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 15px;
      object-fit: contain;
      background-color: #333;
    }
    #step-text {
      font-size: 1rem;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    #navigation {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    button {
      padding: 10px 18px;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:disabled {
      background-color: #777;
      cursor: default;
    }
    #step-counter {
      margin-bottom: 15px;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🛠️ פירוק Magic Trackpad</h1>
  <div id="guide">
    <div id="step-counter"></div>
    <img id="step-image" src="" alt="תמונת שלב">
    <div id="step-text"></div>
    <div id="navigation">
      <button id="prev-btn">הקודם</button>
      <button id="next-btn">הבא</button>
    </div>
  </div>

  <script>
    // מערך השלבים: כל אובייקט מכיל טקסט ותמונת שער
    const steps = [
      {
        text: `ה-Magic Trackpad הוא משטח המגע השולחני הראשון המציע סט מלא של מחוות: לחיצה, גלילה, החלקה וסיבוב – הכל בקצות האצבעות.\n\nדרישות:\n• מחשב מק מסוג שולחני או נייד\n• חיבור Bluetooth\n• macOS‏ 10.6.4 או חדש יותר\n• וכמובן, סוללות! (מטען סוללות של אפל אינו כלול)\n\nעל פי השמועות, ה-Magic Trackpad הוא דגם A1339.`,
        image: "https://guide-images.cdn.ifixit.com/igi/OKmGSYS4qHZ1h1NL.standard"
      },
      {
        text: `ה-Magic Trackpad גדול ב-80% מהמשטח שבמחשבי MacBook Pro נוכחיים.\nהוא מעוצב מאלומיניום ממש כמו המקלדת האלחוטית, כדי לאפשר שילוב מושלם של הקלדה ומחוות.\nמשטח הזכוכית בעל עובי של 0.5 מ"מ ומצופה להגנה מפני בלאי.\nמה יש בפנים? בואו נגלה!`,
        image: "https://guide-images.cdn.ifixit.com/igi/YImFsxtyZH5jNLCo.standard"
      },
      {
        text: `שלב זה עוסק בהוצאת הסוללות. סובבו את פתח הסוללות ופשוט הוציאו את שתי סוללות AA.\nשימו לב לחוט הברגה המרובע – סוג הברגה יעיל במיוחד מבחינה מכנית, אך קשה לייצור ולכן נדיר. שאפו, אפל, על תשומת הלב לפרטים!`,
        image: "https://guide-images.cdn.ifixit.com/igi/haRDIhncK3oj51ac.standard"
      },
      {
        text: `הגיע הזמן להתחיל בפירוק! השתמשו בכלי פלסטי לפתיחת מכשירים כדי להפריד את הפאנל התחתון מהדבק סביב צידו השמאלי, הימני והעליון.\n⚠️ אל תפרקו לאורך הקצה התחתון – קיימים שם תפסים שמחזיקים את המכסה.\nלאחר חיתוך רוב הדבק, הפאנל התחתון יוסר בקלות.`,
        image: "https://guide-images.cdn.ifixit.com/igi/KA2CBSt1Pf1CfAfO.standard"
      }
    ];

    let currentStep = 0;

    const stepCounterEl = document.getElementById('step-counter');
    const stepImageEl = document.getElementById('step-image');
    const stepTextEl = document.getElementById('step-text');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function renderStep() {
      const step = steps[currentStep];
      stepCounterEl.textContent = `${currentStep + 1} / ${steps.length}`;
      stepImageEl.src = step.image;
      stepTextEl.textContent = step.text;
      prevBtn.disabled = currentStep === 0;
      nextBtn.disabled = currentStep === steps.length - 1;
    }

    prevBtn.addEventListener('click', () => {
      if (currentStep > 0) {
        currentStep--;
        renderStep();
      }
    });
    nextBtn.addEventListener('click', () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        renderStep();
      }
    });

    // הצגה ראשונית
    renderStep();
  </script>
</body>
</html>
